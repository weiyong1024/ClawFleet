version: 2

project_name: clawfleet

before:
  hooks:
    - go mod tidy

builds:
  - id: clawfleet
    main: ./cmd/clawfleet
    binary: clawfleet
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/weiyong1024/clawfleet/internal/version.Version=v{{.Version}}
      - -X github.com/weiyong1024/clawfleet/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/weiyong1024/clawfleet/internal/version.BuildDate={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: weiyong1024
    name: ClawFleet
  prerelease: auto
  name_template: "v{{.Version}}"
